services:
  - type: web
    name: tds-ga5-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EXAM_EMAIL
        sync: false
      - key: A2A_BEARER_TOKEN
        sync: false
    healthCheckPath: /health
